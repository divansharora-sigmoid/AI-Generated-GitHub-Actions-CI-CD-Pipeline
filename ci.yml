ci.yml
name: Healthcare CI
on:  pull_request
jobs: 
 test: 
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Run Lint
        run: flake8 .
      - name: Run Tests
        run: pytest --cov=.
